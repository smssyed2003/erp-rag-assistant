<div class="chat-container">

  <div class="chat-header">
    ERP Assistant
  </div>

  <div class="chat-box" #chatBox>
    <div *ngFor="let msg of messages" class="message-wrapper" [ngClass]="msg.role">

      <div class="message-bubble">
        <div class="message-text">
          {{ msg.text }}
        </div>

        <div class="sources" *ngIf="msg.sources?.length">
          Sources: {{ msg.sources.join(', ') }}
        </div>
      </div>

    </div>

    <div *ngIf="isLoading" class="typing">
      <span></span><span></span><span></span>
    </div>

  </div>

  <div class="chat-input">
    <input
      [(ngModel)]="userInput"
      placeholder="Ask something about ERP..."
      (keyup.enter)="sendMessage()"
    />
    <button (click)="sendMessage()">Send</button>
  </div>

</div>
